name: Full CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: 

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install flake8
      - run: flake8 . --max-line-length=100
  test:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10','3.11','3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-python-env
        with:
          python-version: ${{ matrix.python-version }}
      - run: pytest -v

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: './site'
      - id: deployment
        uses: actions/deploy-pages@v4
  check-secret:
    runs-on: ubuntu-latest
    env:
      APP_ENV: production
      APP_VERSION: "1.0.0"
    steps:
      - name: Show normal env vars
        run: |
          echo "Environment: $APP_ENV"
          echo "Version: $APP_VERSION" 

      - name: Use the repo secret
        env:
          MY_SECRET: ${{secrets.THE_WORLD}}
        run: |
          echo "Secret length check:"
          echo -n "$MY_SECRET" | wc -c
          echo "$MY_SECRET"
      
      - name: Correct way - only use secret transiently, never persist into
        env:
          MY_SECRET: ${{secrets.THE_WORLD}}
        run: |
          # 只在記憶體中的這個 process 使用, 例如直接當 API 呼叫的授權標頭
          curl -s -H "Authorization: Bearer $MY_SECRET" https://api.github.com/rate_limit
          # 用完就結束, 不寫進任何檔案, 也不 echo 
          
  test-in-docker:
    runs-on: ubuntu-latest
    container:
      image: python:3.12-slim
    steps:
      - uses: actions/checkout@v4
      - run: pip install -r requirements.txt pytest
      - run: pytest -v

  notify-on-failure:
    needs:
      - lint
      - test
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - run: echo "Pipeline failed! Check the logs."
